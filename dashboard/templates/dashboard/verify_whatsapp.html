{% extends 'dashboard/auth_base2.html' %}

{% block title %}Verify WhatsApp - XPENSEDIARY{% endblock %}

{% block auth_content %}
<div>
    <p class="text-xs uppercase tracking-[0.2em] text-emerald-700 font-bold mb-2">WhatsApp Sync</p>
    <h2 class="font-headline text-3xl font-extrabold tracking-tight mb-2">Verify WhatsApp</h2>
    <p class="text-slate-500 text-sm mb-6">Enter the 6-digit OTP sent to your WhatsApp number.</p>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        
        <div>
            <label for="otp" class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 block">OTP</label>
            <input type="text" id="otp" name="otp" maxlength="6" 
                   placeholder="123456" required autofocus
                   class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-center text-lg tracking-[0.2em] font-semibold focus:border-emerald-500 focus:ring-emerald-500">
        </div>
        
        <button type="submit" class="w-full custom-gradient text-white font-bold py-3 rounded-xl shadow-md hover:shadow-lg transition-all">Verify</button>
    </form>
    
    <p class="text-center mt-6 text-sm text-slate-600">
        <a href="{% url 'dashboard:link_whatsapp' %}" class="font-bold text-emerald-700 hover:underline">Resend OTP</a>
    </p>
</div>
{% endblock %}
